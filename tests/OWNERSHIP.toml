# Root integration test ownership manifest.
# Each entry records why a test must remain at root.
# Categories: static_policy, composition, facade, executable, platform, qualification
# Domain tests should NOT appear here — they belong in their owning crate.

[[test]]
name = "abi_memory_boundary_guard"
class = "static_policy"
owners = ["synvoid-plugin-runtime"]
reason = "validates ABI memory boundary across workspace plugin boundary"

