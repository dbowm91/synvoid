[target.x86_64-unknown-linux-musl]
pre-build = ["bash -c 'apt-get update && apt-get install -y curl unzip && curl -sL https://github.com/protocolbuffers/protobuf/releases/download/v25.1/protoc-25.1-linux-x86_64.zip -o /tmp/protoc.zip && unzip -o /tmp/protoc.zip -d /usr/local bin/protoc'"]

