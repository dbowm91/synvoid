[package]
name = "my-waf-app"
version = "0.1.0"
edition = "2021"

[dependencies]
axum.workspace = true
serde.workspace = true
serde_json.workspace = true
chrono.workspace = true
tokio.workspace = true
tower.workspace = true
tracing = "0.1"

[lib]
name = "myapp"
crate-type = ["lib", "cdylib", "staticlib"]

[[bin]]
name = "my-waf-app"
path = "main.rs"

[features]
default = []

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
