# SynVoid DNS — Encrypted Transport Profile (DoT / DoH)
#
# DNS-over-TLS and DNS-over-HTTPS for encrypted DNS resolution.
#
# Support status: Beta
#
# WARNING: DoQ (DNS-over-QUIC) is Experimental.
# WARNING: Invalid certificates cause startup failure.

[dns]
enabled = true
bind_address = "0.0.0.0"
port = 53
mode = "standalone"

[dns.settings]
default_ttl = 300
cache_enabled = true

[dns.firewall]
enabled = true
block_zone_transfers = true
block_internal_ips = true

# DNS-over-TLS
[dns.dot]
enabled = true
bind_address = "0.0.0.0"
port = 853
# TLS certificate and key (PEM format)
tls_cert_path = "/etc/letsencrypt/live/dns.example.com/fullchain.pem"
tls_key_path = "/etc/letsencrypt/live/dns.example.com/privkey.pem"
# NOTE: min_tls_version and require_client_cert are not supported fields

# DNS-over-HTTPS
[dns.doh]
enabled = true
bind_address = "0.0.0.0"
port = 443
tls_cert_path = "/etc/letsencrypt/live/dns.example.com/fullchain.pem"
tls_key_path = "/etc/letsencrypt/live/dns.example.com/privkey.pem"
path = "/dns-query"
# NOTE: enable_http2 is not a supported field

# DNS-over-QUIC — EXPERIMENTAL, not recommended for production
# [dns.doq]
# enabled = false
# port = 853
# tls_cert_path = "/etc/letsencrypt/live/dns.example.com/fullchain.pem"
# tls_key_path = "/etc/letsencrypt/live/dns.example.com/privkey.pem"
# max_concurrent_streams = 100
# idle_timeout_secs = 30

[[dns.zones.items]]
zone = "example.com"

# WARNING: Do NOT enable:
#   - dns.doq in production (experimental, protocol not finalized)
#   - dns.recursive (open resolver risk)
#   - dns.dot/doh without valid certificates (causes startup failure)
