[package]
name = "synvoid-waf"
version = "0.1.0"
edition = "2021"
license.workspace = true

[dependencies]
synvoid-core = { path = "../synvoid-core" }
synvoid-utils = { path = "../synvoid-utils", features = ["buffer"] }
synvoid-challenge = { path = "../synvoid-challenge" }
synvoid-config = { path = "../synvoid-config" }
serde = { version = "1", features = ["derive"] }
parking_lot = "0.12"
regex = "1"
aho-corasick = "1.1"
unicode-normalization = "0.1"
libinjectionrs = "0.1"
sha2 = "0.10"
hex = "0.4"
subtle = "2"
rand = "0.9"
moka = { version = "0.12", features = ["sync"] }
http = "1"
bitflags = "2"
tracing = "0.1"
base64 = "0.22"
serde_json = "1"
tokio = { version = "1", features = ["rt", "macros", "time", "sync", "fs"] }
isbot = "0.1"
metrics = "0.22"
dashmap = "6"
async-trait = "0.1"
arc-swap = "1"
bytes = "1"
futures-core = "0.3"
