[package]
name = "synvoid-upload"
version = "0.1.0"
edition = "2021"
license.workspace = true

[features]
default = []
mesh = ["dep:synvoid-mesh", "synvoid-mesh/mesh"]

[dependencies]
synvoid-config = { path = "../synvoid-config" }
synvoid-utils = { path = "../synvoid-utils" }
synvoid-http-client = { path = "../synvoid-http-client" }
synvoid-platform = { path = "../synvoid-platform" }
synvoid-app-handlers = { path = "../synvoid-app-handlers" }
synvoid-mesh = { path = "../synvoid-mesh", optional = true }
parking_lot = "0.12"
tokio = { version = "1", features = ["rt", "time", "sync", "macros"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tracing = "0.1"
regex = "1"
sha2 = "0.10"
walkdir = "2"
chrono = "0.4"
ed25519-dalek = "2"
base64 = "0.22"
tempfile = "3"
uuid = { version = "1", features = ["v4"] }
arc-swap = "1"
yara-x = { version = "1.15", default-features = false, features = ["default-modules", "linkme"] }
zip = "2"

[dev-dependencies]
toml = "0.8"
