[package]
name = "synvoid-tls"
version = "0.1.0"
edition = "2021"

[features]
default = []
dns = []

[dependencies]
synvoid-config = { path = "../synvoid-config" }
rustls = { version = "0.23", features = ["prefer-post-quantum", "aws-lc-rs"] }
rustls-pki-types = "1"
tokio-rustls = "0.26"
x509-parser = "0.16"
rsa = "0.9"
instant-acme = { version = "0.8", features = ["aws-lc-rs", "rcgen"] }
serde_json = "1"
base64 = "0.22"
hex = "0.4"
sha2 = "0.10"
tokio = { version = "1", features = ["rt", "time", "io-util", "sync", "fs", "macros"] }
parking_lot = "0.12"
dashmap = "7.0.0-rc2"
notify = "9.0.0-rc.3"
metrics = "0.22"
chrono = { version = "0.4", features = ["serde"] }
thiserror = "2"
tracing = "0.1"
