syntax = "proto3";

package mesh;

option go_package = "github.com/maluwaf/mesh;mesh";

message MeshCapabilities {
    bool can_route = 1;
    bool can_proxy = 2;
    uint32 max_hops = 3;
    repeated string supported_services = 4;
    uint32 preferred_transport = 5;
    bool can_serve_dns = 6;
    bool is_global = 7;
    bool waf_enabled = 8;
    repeated string supported_protocols = 9;
}

message UpstreamInfo {
    string upstream_id = 1;
    optional string upstream_url = 2;
    optional string geo = 3;
    bool is_local = 4;
    string owner_node_id = 5;
    repeated string peered_wafs = 6;
    string url_hash = 7;
    WafPolicy waf_policy = 8;
    UpstreamProtocol protocol = 9;
}

message UpstreamOwner {
    string owner_node_id = 1;
    repeated string peered_wafs = 2;
}

message WafPolicy {
    bool skip_rate_limit = 1;
    bool skip_auth_challenge = 2;
    bool skip_pow_challenge = 3;
    bool skip_honeypot = 4;
    repeated string enabled_rules = 5;
    repeated string disabled_rules = 6;
    uint32 threat_level = 7;
    bool enable_bot_protection = 8;
    bool enable_ip_feed = 9;
    bool enable_threat_level = 10;
    bool enable_traffic_shaping = 11;
    string policy_mode = 12;
    uint32 priority_tier = 13;
    RateLimitOverride rate_limit_override = 14;
    bool enable_mesh_key_exchange = 15;
    bool enable_mesh_auditing = 16;
    optional string mesh_id = 17;
    optional string mesh_global_node_url = 18;
    repeated string mesh_audit_urls = 19;
    bool fallback_to_regular_pow = 20;
}

message RateLimitOverride {
    optional uint64 requests_per_second = 1;
    optional uint64 requests_per_minute = 2;
    optional uint64 requests_per_hour = 3;
    optional uint64 concurrent_connections = 4;
    optional uint64 bandwidth_mbps = 5;
    optional uint64 burst_size = 6;
}

message TierClaim {
    uint32 tier = 1;
    string key_id = 2;
    string org_id = 3;
    string mesh_id = 7;
    uint64 timestamp = 4;
    string nonce = 5;
    bytes signature = 6;
}

message TierKey {
    string key_id = 1;
    uint32 tier = 2;
    bytes key = 3;
    uint64 valid_from = 4;
    uint64 valid_until = 5;
    string issued_by = 6;
    bool revoked = 7;
}

message TierKeyAnnounce {
    string org_id = 1;
    TierKey key = 2;
    bytes signature = 3;
}

message TierKeyRevoke {
    string org_id = 1;
    string key_id = 2;
    bytes signature = 3;
}

message TierKeyQuery {
    string request_id = 1;
    string org_id = 2;
    uint32 requested_tier = 3;
}

message TierKeyQueryResponse {
    string request_id = 1;
    repeated TierKey keys = 2;
    bytes signature = 3;
}

message UnspentTierKeyAnnounce {
    string org_id = 1;
    repeated TierKey tier_keys = 2;
    bytes signature = 3;
    uint64 timestamp = 4;
}

message AlternativeProvider {
    string node_id = 1;
    uint32 priority_tier = 2;
}

message RouteRejected {
    string query_id = 1;
    string upstream_id = 2;
    string reason = 3;
    repeated AlternativeProvider alternatives = 4;
}

enum UpstreamProtocol {
    UNKNOWN = 0;
    HTTP = 1;
    HTTPS = 2;
    TCP = 3;
    UDP = 4;
    GRPC = 5;
    WEBSOCKET = 6;
    WEBSOCKETS = 7;
}

message MeshPeerInfo {
    string node_id = 1;
    string address = 2;
    uint32 roles = 3;
    MeshCapabilities capabilities = 4;
    bool is_global = 5;
    optional uint32 latency_ms = 6;
    repeated string upstreams = 7;
    bool is_trusted = 8;
    optional uint32 quic_port = 9;
    optional uint32 wireguard_port = 10;
    optional uint32 advertised_port = 11;
    bool dns_serving_healthy = 12;
}

message MeshMessage {
    uint32 message_type = 1;
    
    oneof payload {
        Hello hello = 10;
        HelloAck hello_ack = 11;
        SyncRequest sync_request = 12;
        SyncResponse sync_response = 13;
        RouteQuery route_query = 14;
        RouteResponse route_response = 15;
        RouteResponseAck route_response_ack = 40;
        RouteNotFound route_not_found = 16;
        UpstreamUrlRequest upstream_url_request = 17;
        UpstreamUrlResponse upstream_url_response = 18;
        UpstreamUrlDenied upstream_url_denied = 19;
        UpstreamAnnounce upstream_announce = 20;
        UpstreamUpdate upstream_update = 21;
        KeepAlive keep_alive = 22;
        KeepAliveAck keep_alive_ack = 23;
        Error error = 24;
        LookupRequest lookup_request = 25;
        LookupResponse lookup_response = 26;
        LookupBatchRequest lookup_batch_request = 27;
        LookupBatchResponse lookup_batch_response = 28;
        PeerHealthCheck peer_health_check = 29;
        PeerHealthResponse peer_health_response = 30;
        PeerAnnounce peer_announce = 31;
        PeerGone peer_gone = 32;
        TopologySyncRequest topology_sync_request = 33;
        TopologySyncResponse topology_sync_response = 34;
        SeedListRequest seed_list_request = 35;
        SeedListResponse seed_list_response = 36;
        PeerLoadReport peer_load_report = 37;
        PeerLoadUpdate peer_load_update = 38;
        RouteUsageReport route_usage_report = 39;
        UpstreamBlocked upstream_blocked = 70;
        BandwidthReport bandwidth_report = 71;
        MeshAck mesh_ack = 41;
        AuthChallenge auth_challenge = 42;
        AuthResponse auth_response = 43;
        ThreatAnnounce threat_announce = 50;
        ThreatSyncRequest threat_sync_request = 51;
        ThreatSyncResponse threat_sync_response = 52;
        ThreatAcknowledgement threat_ack = 53;
        ReputationUpdate reputation_update = 54;
        YaraRuleAnnounce yara_rule_announce = 86;
        YaraRuleSyncRequest yara_rule_sync_request = 87;
        YaraRuleSyncResponse yara_rule_sync_response = 88;
        YaraRuleAcknowledgement yara_rule_ack = 89;
        YaraRuleSubmission yara_rule_submission = 90;
        YaraRuleSubmissionResponse yara_rule_submission_response = 91;
        RouteRejected route_rejected = 55;
        TierKeyAnnounce tier_key_announce = 56;
        TierKeyRevoke tier_key_revoke = 57;
        TierKeyQuery tier_key_query = 58;
        TierKeyQueryResponse tier_key_query_response = 59;
        UnspentTierKeyAnnounce unspent_tier_key_announce = 66;
        OrgRegistrationRequest org_registration_request = 60;
        OrgRegistrationResponse org_registration_response = 61;
        OrgInvitationRequest org_invitation_request = 62;
        OrgInvitationAccept org_invitation_accept = 63;
        OrgInvitationResponse org_invitation_response = 64;
        GlobalNodeAnnounce global_node_announce = 67;
        OrgMemberAnnounce org_member_announce = 65;
        DhtRecordAnnounce dht_record_announce = 75;
        DhtRecordQuery dht_record_query = 76;
        DhtRecordResponse dht_record_response = 77;
        DhtSyncRequest dht_sync_request = 78;
        DhtSyncResponse dht_sync_response = 79;
        DhtSnapshotRequest dht_snapshot_request = 80;
        DhtSnapshotResponse dht_snapshot_response = 81;
        DhtAntiEntropyRequest dht_anti_entropy_request = 92;
        DhtAntiEntropyResponse dht_anti_entropy_response = 93;
        DhtRecordPush dht_record_push = 94;
        DhtRecordPushAck dht_record_push_ack = 95;
        UpstreamVerificationQuery upstream_verification_query = 98;
        UpstreamVerificationResponse upstream_verification_response = 99;
        KeyForward key_forward = 100;
        KeySigned key_signed = 101;
        FindNode find_node = 102;
        FindNodeResponse find_node_response = 103;
        Ping ping = 104;
        Pong pong = 105;
        NetworkPolicyUpdate network_policy_update = 106;
        GlobalNodeBlocklistUpdate global_node_blocklist_update = 107;
        OriginKeyQuery origin_key_query = 108;
        OriginKeyQueryResponse origin_key_query_response = 109;
        NodeShutdown node_shutdown = 110;
        DnsDomainRegisterRequest dns_domain_register_request = 111;
        DnsDomainRegisterResponse dns_domain_register_response = 112;
        DnsDomainDeregisterRequest dns_domain_deregister_request = 113;
        DnsDomainRegistered dns_domain_registered = 114;
        DnsDomainDeregistered dns_domain_deregistered = 115;
        DnsRegistrationRequest dns_registration_request = 116;
        DnsRegistrationResponse dns_registration_response = 117;
        DnsVerificationUpdate dns_verification_update = 118;
        AnycastNodeRegistration anycast_node_registration = 120;
        AnycastHealthUpdate anycast_health_update = 121;
        ZoneSyncRequest zone_sync_request = 122;
        ZoneSyncResponse zone_sync_response = 123;
        ZoneSyncAck zone_sync_ack = 124;
        SiteConfigSync site_config_sync = 125;
        AiBotListUpdate ai_bot_list_update = 126;
        WasmModuleAnnounce wasm_module_announce = 127;
        WasmModuleSyncRequest wasm_module_sync_request = 128;
        WasmModuleSyncResponse wasm_module_sync_response = 129;
        SessionRotate session_rotate = 130;
        SessionRotateAck session_rotate_ack = 131;
        ServerlessFunctionAnnounce serverless_function_announce = 132;
        UpstreamOwnershipChallenge upstream_ownership_challenge = 133;
        UpstreamChallengeProof upstream_challenge_proof = 134;
        GenesisKeyTransition genesis_key_transition = 135;
        RevokeGlobalNode revoke_global_node = 136;
        SiteTlsCertSync site_tls_cert_sync = 137;
        SiteTlsCertRequest site_tls_cert_request = 138;
        SiteTlsCertResponse site_tls_cert_response = 139;
    }
}

message GenesisKeyTransition {
    uint32 sequence = 1;
    string new_key_fingerprint = 2;
    string announced_by = 3;
    uint64 timestamp = 4;
    bytes genesis_signature = 5;
}

message RevokeGlobalNode {
    string node_id = 1;
    string reason = 2;
    uint64 timestamp = 3;
    bytes genesis_signature = 4;
}

message Hello {
    uint32 version = 1;
    string node_id = 2;
    uint32 roles = 3;
    MeshCapabilities capabilities = 4;
    map<string, UpstreamInfo> upstreams = 5;
    optional string auth_token = 6;
    optional string network_id = 7;
    optional string global_node_key = 8;
    optional uint64 timestamp = 9;
    optional string nonce = 10;
    optional bool is_trusted = 11;
    optional uint32 quic_port = 12;
    optional uint32 wireguard_port = 13;
    optional string public_key = 14;
    optional uint64 pow_nonce = 15;
    optional string pow_public_key = 16;
}

message HelloAck {
    uint32 version = 1;
    string node_id = 2;
    uint32 roles = 3;
    string session_id = 4;
    optional MeshCapabilities capabilities = 15;
    map<string, UpstreamInfo> upstreams = 5;
    optional string auth_token = 6;
    optional string network_id = 7;
    optional string global_node_key = 8;
    optional uint64 timestamp = 9;
    optional string nonce = 12;
    optional bool is_trusted = 13;
    optional uint32 quic_port = 10;
    optional uint32 wireguard_port = 11;
    optional string public_key = 14;
}

message SyncRequest {
    string node_id = 1;
}

message SyncResponse {
    repeated MeshPeerInfo nodes = 1;
    map<string, UpstreamOwner> upstreams = 2;
    uint64 timestamp = 3;
}

message RouteQuery {
    string query_id = 1;
    string upstream_id = 2;
    uint32 max_hops = 3;
    string initiator = 4;
    uint32 sequence = 5;
    uint64 timestamp = 6;
    string nonce = 7;
}

message RouteResponse {
    string query_id = 1;
    string upstream_id = 2;
    string provider_node_id = 3;
    uint32 hops = 4;
    uint32 ttl_secs = 5;
    bytes signature = 6;
    uint32 sequence = 7;
    uint64 timestamp = 8;
    string nonce = 9;
    optional string upstream_url = 10;
    WafPolicy waf_policy = 11;
    uint32 priority_tier = 12;
    TierClaim tier_claim = 13;
    optional string org_id = 14;
    optional string mesh_name = 15;
}

message RouteResponseAck {
    string query_id = 1;
    string upstream_id = 2;
    string provider_node_id = 3;
}

message RouteNotFound {
    string query_id = 1;
    string upstream_id = 2;
}

message UpstreamUrlRequest {
    string request_id = 1;
    string upstream_id = 2;
    string url_hash = 3;
}

message UpstreamUrlResponse {
    string request_id = 1;
    string upstream_id = 2;
    string upstream_url = 3;
    bytes signature = 4;
}

message UpstreamUrlDenied {
    string request_id = 1;
    string upstream_id = 2;
}

message UpstreamAnnounce {
    string upstream_id = 1;
    uint32 action = 2;
    bytes signature = 3;
    string origin_ed25519_pubkey = 4;
    bytes origin_signature = 5;
}

message UpstreamUpdate {
    string upstream_id = 1;
    UpstreamInfo info = 2;
    bytes signature = 3;
}

message KeepAlive {}

message KeepAliveAck {}

message LookupRequest {
    string request_id = 1;
    string key = 2;
    uint32 lookup_type = 3;
}

message LookupResponse {
    string request_id = 1;
    string key = 2;
    optional bytes value = 3;
    bool found = 4;
}

message LookupBatchRequest {
    string request_id = 1;
    repeated string keys = 2;
}

message LookupBatchResponse {
    string request_id = 1;
    map<string, bytes> results = 2;
}

message PeerHealthCheck {
    string peer_id = 1;
    uint64 timestamp = 2;
}

message PeerHealthResponse {
    string peer_id = 1;
    uint32 status = 2;
    optional uint32 latency_ms = 3;
    uint64 timestamp = 4;
}

message PeerAnnounce {
    string node_id = 1;
    string address = 2;
    uint32 role = 3;
    MeshCapabilities capabilities = 4;
    uint64 announced_at = 5;
}

message PeerGone {
    string node_id = 1;
    string reason = 2;
}

message TopologySyncRequest {
    string request_id = 1;
    uint64 from_version = 2;
    bool prefer_delta = 3;
}

message TopologySyncResponse {
    string request_id = 1;
    repeated MeshPeerInfo peers = 2;
    map<string, UpstreamOwner> upstreams = 3;
    uint64 version = 4;
    bool is_delta = 5;
    repeated string removed_peers = 6;
    repeated string removed_upstreams = 7;
}

message SeedListRequest {
    string node_id = 1;
    bool request_full_mesh = 2;
}

message SeedListResponse {
    repeated MeshPeerInfo global_nodes = 1;
    repeated MeshPeerInfo edge_nodes = 2;
    uint64 version = 3;
    string genesis_org_id = 4;
}

message PeerLoadReport {
    string node_id = 1;
    uint32 active_connections = 2;
    float cpu_load_percent = 3;
    float memory_percent = 4;
    float requests_per_second = 5;
}

message PeerLoadUpdate {
    string node_id = 1;
    double load_score = 2;
}

message RouteUsageReport {
    string upstream_id = 1;
    uint64 request_count = 2;
    uint64 bytes_transferred = 3;
}

message UpstreamBlocked {
    string mesh_identifier = 1;
    string service_id = 2;
    uint64 blocked_until = 3;
    string reason = 4;
    string origin_node_id = 5;
}

message BandwidthReport {
    string upstream_id = 1;
    uint64 bytes_sent = 2;
    uint64 bytes_received = 3;
    uint64 request_count = 4;
    uint64 interval_secs = 5;
    uint64 timestamp = 6;
}

message MeshAck {
    string original_message_id = 1;
    uint32 status = 2;
    uint64 timestamp = 3;
}

message AuthChallenge {
    string challenge = 1;
    string challenge_id = 2;
    uint64 expires_at = 3;
}

message AuthResponse {
    string challenge_id = 1;
    string response = 2;
}

message Error {
    uint32 code = 1;
    string message = 2;
}

enum ThreatType {
    THREAT_TYPE_UNSPECIFIED = 0;
    THREAT_TYPE_IP_BLOCK = 1;
    THREAT_TYPE_RATE_LIMIT_VIOLATION = 2;
    THREAT_TYPE_SUSPICIOUS_ACTIVITY = 3;
}

enum ThreatSeverity {
    THREAT_SEVERITY_UNSPECIFIED = 0;
    THREAT_SEVERITY_LOW = 1;
    THREAT_SEVERITY_MEDIUM = 2;
    THREAT_SEVERITY_HIGH = 3;
    THREAT_SEVERITY_CRITICAL = 4;
}

message ThreatIndicator {
    ThreatType threat_type = 1;
    string indicator_value = 2;
    ThreatSeverity severity = 3;
    string reason = 4;
    uint64 ttl_seconds = 5;
    string source_node_id = 6;
    uint64 timestamp = 7;
    string site_scope = 8;
    optional uint64 rate_limit_requests = 9;
    optional uint64 rate_limit_window_secs = 10;
    optional string suspicious_pattern = 11;
    bytes signature = 12;
    string signer_public_key = 13;
}

message ThreatAnnounce {
    string request_id = 1;
    repeated ThreatIndicator indicators = 2;
    ThreatSeverity highest_severity = 3;
    uint64 timestamp = 4;
    string source_node_id = 5;
    uint32 source_role = 6;
    uint64 source_reputation = 7;
    bytes signature = 8;
    string signer_public_key = 9;
}

message ThreatSyncRequest {
    string request_id = 1;
    string node_id = 2;
    uint64 from_version = 3;
    bool prefer_delta = 4;
}

message ThreatSyncResponse {
    string request_id = 1;
    repeated ThreatIndicator indicators = 2;
    uint64 version = 3;
    bool is_delta = 4;
    repeated string removed_indicators = 5;
    bytes signature = 6;
    string signer_public_key = 7;
}

message ThreatAcknowledgement {
    string original_request_id = 1;
    string node_id = 2;
    bool accepted = 3;
    string reason = 4;
    uint64 timestamp = 5;
}

message YaraRuleAnnounce {
    string request_id = 1;
    string version = 2;
    string rules = 3;
    uint64 timestamp = 4;
    string source_node_id = 5;
    uint32 source_role = 6;
    bytes signature = 7;
    string signer_public_key = 8;
}

message YaraRuleSyncRequest {
    string request_id = 1;
    string node_id = 2;
    optional string version = 3;
}

message YaraRuleSyncResponse {
    string request_id = 1;
    string version = 2;
    string rules = 3;
    bool is_full = 4;
    uint64 timestamp = 5;
    bytes signature = 6;
    string signer_public_key = 7;
}

message YaraRuleAcknowledgement {
    string original_request_id = 1;
    string node_id = 2;
    bool accepted = 3;
    string reason = 4;
    uint64 timestamp = 5;
}

message YaraRuleSubmission {
    string request_id = 1;
    string submission_id = 2;
    string node_id = 3;
    uint64 timestamp = 4;
    bytes signature = 5;
    string rules = 6;
    string description = 7;
    string signer_public_key = 8;
}

message YaraRuleSubmissionResponse {
    string original_request_id = 1;
    string submission_id = 2;
    string node_id = 3;
    string status = 4;
    uint64 timestamp = 5;
}

message DhtRecord {
    string key = 1;
    bytes value = 2;
    uint64 timestamp = 3;
    uint64 ttl_seconds = 4;
    string source_node_id = 5;
    bytes signature = 6;
    string signer_public_key = 7;
}

message DhtRecordAnnounce {
    string request_id = 1;
    repeated DhtRecord records = 2;
    uint32 write_quorum = 3;
    uint64 timestamp = 4;
    string source_node_id = 5;
    bytes signature = 6;
    string signer_public_key = 7;
}

message DhtRecordQuery {
    string request_id = 1;
    string key = 2;
    uint64 timestamp = 3;
    string source_node_id = 4;
}

message DhtRecordResponse {
    string request_id = 1;
    string key = 2;
    bytes value = 3;
    bool found = 4;
    uint64 timestamp = 5;
    string source_node_id = 6;
    bytes signature = 7;
    string signer_public_key = 8;
}

message DhtSyncRequest {
    string request_id = 1;
    string node_id = 2;
    uint64 from_version = 3;
}

message DhtSyncResponse {
    string request_id = 1;
    repeated DhtRecord records = 2;
    uint64 version = 3;
    uint64 timestamp = 4;
    bytes signature = 5;
    string signer_public_key = 6;
}

message DhtSnapshotRequest {
    string request_id = 1;
    string node_id = 2;
    uint64 from_version = 3;
    bytes signature = 4;
    string signer_public_key = 5;
}

message DhtSnapshotResponse {
    string request_id = 1;
    repeated DhtRecord records = 2;
    uint64 version = 3;
    uint64 timestamp = 4;
    bytes signature = 5;
    string signer_public_key = 6;
}

message MerkleProof {
    bytes root_hash = 1;
    repeated string proof_keys = 2;
    repeated bytes proof_hashes = 3;
    uint32 tree_height = 4;
}

message DhtAntiEntropyRequest {
    string request_id = 1;
    string node_id = 2;
    bytes local_root_hash = 3;
    repeated string interested_keys = 4;
    uint64 timestamp = 5;
    string signer_public_key = 6;
}

message DhtAntiEntropyResponse {
    string request_id = 1;
    bytes root_hash = 2;
    repeated string proof_keys = 3;
    repeated bytes proof_hashes = 4;
    repeated DhtRecord missing_records = 5;
    uint64 timestamp = 6;
    bytes signature = 7;
    string signer_public_key = 8;
}

message DhtRecordPush {
    string request_id = 1;
    repeated DhtRecord records = 2;
    uint32 hop_count = 3;
    repeated string seen_node_ids = 4;
    uint64 timestamp = 5;
    string signer_public_key = 6;
}

message DhtRecordPushAck {
    string request_id = 1;
    string original_request_id = 2;
    string node_id = 3;
    bool accepted = 4;
    repeated string missing_keys = 5;
    uint64 timestamp = 6;
}

message UpstreamVerificationQuery {
    string request_id = 1;
    string upstream_id = 2;
    string querying_node_id = 3;
    uint64 timestamp = 4;
    string provider_node_id = 5;
}

message UpstreamVerificationResponse {
    string request_id = 1;
    string upstream_id = 2;
    bool verified = 3;
    string global_node_id = 4;
    bytes global_node_signature = 5;
    string upstream_url = 6;
    optional string org_id = 7;
    uint64 timestamp = 8;
    string provider_node_id = 9;
}

message UpstreamOwnershipChallenge {
    string request_id = 1;
    string upstream_id = 2;
    OwnershipChallengeType challenge_type = 3;
    string challenge_token = 4;
    string global_node_id = 5;
    uint64 timestamp = 6;
}

message OwnershipChallengeType {
    oneof challenge {
        Http01Challenge http01 = 1;
        Dns01Challenge dns01 = 2;
    }
}

message Http01Challenge {
    string token = 1;
    string key_authorization = 2;
}

message Dns01Challenge {
    string domain = 1;
    string txt_record_name = 2;
    string txt_record_value = 3;
}

message UpstreamChallengeProof {
    string request_id = 1;
    string upstream_id = 2;
    OwnershipChallengeProof challenge_proof = 3;
    string origin_node_id = 4;
    uint64 timestamp = 5;
}

message OwnershipChallengeProof {
    oneof proof {
        Http01Proof http01_proof = 1;
        Dns01Proof dns01_proof = 2;
    }
}

message Http01Proof {
    string key_authorization = 1;
}

message Dns01Proof {
    string txt_record_value = 1;
}

message ReputationUpdate {
    string node_id = 1;
    int64 reputation_score = 2;
    uint64 threats_accepted = 3;
    uint64 threats_rejected = 4;
    uint64 false_positive_reports = 5;
    uint64 timestamp = 6;
    bytes signature = 7;
}

message OrgRegistrationRequest {
    string request_id = 1;
    string org_name = 2;
    string requesting_node_id = 3;
    string requesting_node_pubkey = 4;
    uint64 timestamp = 5;
    bytes signature = 6;
}

message OrgRegistrationResponse {
    string request_id = 1;
    string org_id = 2;
    string org_name = 3;
    bool approved = 4;
    string reason = 5;
    TierKey initial_tier_key = 6;
    bytes signature = 7;
    uint64 timestamp = 8;
}

message OrgInvitationRequest {
    string request_id = 1;
    string org_id = 2;
    string inviter_node_id = 3;
    string invited_node_id = 4;
    string invited_node_pubkey = 9;
    string invitation_token = 5;
    uint64 expires_at = 6;
    uint64 timestamp = 7;
    bytes signature = 8;
}

message OrgInvitationAccept {
    string request_id = 1;
    string org_id = 2;
    string invited_node_id = 3;
    string invitation_token = 4;
    string proof_of_key = 5;
    uint64 timestamp = 6;
    bytes signature = 7;
}

message OrgInvitationResponse {
    string request_id = 1;
    string org_id = 2;
    bool accepted = 3;
    TierKey org_key = 4;
    string reason = 5;
    bytes signature = 6;
    uint64 timestamp = 7;
}

message GlobalNodeAnnounce {
    string node_id = 1;
    string public_key = 2;
    uint32 action = 3;
    uint64 timestamp = 4;
    bytes signature = 5;
    string key_exchange_endpoint = 6;
}

message OrgMemberAnnounce {
    string org_id = 1;
    string member_node_id = 2;
    string announced_by = 3;
    uint64 joined_at = 4;
    bytes signature = 5;
}

message KeyForward {
    string session_id = 1;
    string key_id = 2;
    string mesh_id = 3;
    string client_x25519_pubkey = 4;
    string global_node_id = 5;
    string nonce = 6;
    uint64 timestamp = 7;
}

message KeySigned {
    string session_id = 1;
    string key_id = 2;
    string mesh_id = 3;
    string origin_mesh_id = 4;
    string origin_ed25519_pubkey = 5;
    string server_x25519_pubkey = 6;
    bytes origin_signature = 7;
    string nonce = 8;
    uint64 timestamp = 9;
}

// gRPC Key Exchange Service for origin-signed key exchange

service KeyExchangeService {
    rpc RequestKey(KeyRequestOrigin) returns (KeyOfferOrigin);
    rpc ConfirmKey(KeyConfirm) returns (KeyConfirmResponse);
}

message KeyRequestOrigin {
    string mesh_id = 1;
    string client_x25519_pubkey = 2;
    string nonce = 3;
}

message KeyOfferOrigin {
    string type = 1;
    string session_id = 2;
    string key_id = 3;
    string mesh_id = 4;
    string server_x25519_pubkey = 5;
    string origin_mesh_id = 6;
    string origin_ed25519_pubkey = 7;
    string origin_signature = 8;
    int64 expires_at = 9;
    string nonce = 10;
    string server_ed25519_pubkey = 11;
}

message KeyConfirm {
    string session_id = 1;
    string client_x25519_pubkey = 2;
}

message KeyConfirmResponse {
    bool success = 1;
    string error = 2;
}

// ML-KEM-768 Key Exchange Messages (Post-Quantum)

service MlKemKeyExchangeService {
    rpc RequestKey(MlKemKeyRequest) returns (MlKemKeyOffer);
    rpc ConfirmKey(MlKemKeyConfirm) returns (MlKemKeyConfirmResponse);
}

message MlKemKeyRequest {
    string mesh_id = 1;
    string client_mlkem_pubkey = 2;  // 1184 bytes, base64 encoded
    string nonce = 3;
}

message MlKemKeyOffer {
    string session_id = 1;
    string key_id = 2;
    string mesh_id = 3;
    string server_mlkem_pubkey = 4;  // 1184 bytes, base64 encoded
    string ciphertext = 5;          // 1088 bytes, base64 encoded (encapsulated key)
    string origin_mesh_id = 6;
    string origin_ed25519_pubkey = 7;   // For authentication
    string origin_signature = 8;         // Signs session_id|key_id|mesh_id|server_mlkem_pubkey|ciphertext
    int64 expires_at = 9;
    string nonce = 10;
}

message MlKemKeyConfirm {
    string session_id = 1;
    string client_mlkem_pubkey = 2;
}

message MlKemKeyConfirmResponse {
    bool success = 1;
    string error = 2;
}

// Kademlia Routing Messages
message FindNode {
    string request_id = 1;
    bytes target_node_id = 2;
    string requester_node_id = 3;
    uint64 timestamp = 4;
}

message FindNodeResponse {
    string request_id = 1;
    repeated PeerContact peers = 2;
    string responder_node_id = 3;
    uint64 timestamp = 4;
}

message Ping {
    string request_id = 1;
    string node_id = 2;
    uint64 timestamp = 3;
}

message Pong {
    string request_id = 1;
    string node_id = 2;
    uint64 timestamp = 3;
}

message PeerContact {
    bytes node_id = 1;
    string node_id_string = 2;
    string address = 3;
    uint32 port = 4;
    string country = 5;
    string region = 6;
    double latitude = 7;
    double longitude = 8;
    uint32 latency_ms = 9;
    uint64 last_seen = 10;
    bool is_global = 11;
    bool is_trusted = 12;
}

// Network Policy Messages
message BlockedNode {
    string node_id = 1;
    optional string blocked_ip = 2;
    optional string blocked_hash = 3;
    string reason = 4;
    uint64 blocked_at = 5;
    string blocked_by = 6;
    optional uint64 expires_at = 7;
}

message NetworkPolicy {
    int64 min_reputation_for_read = 1;
    int64 min_reputation_for_write = 2;
    repeated BlockedNode blocked_nodes = 3;
    uint64 last_updated = 4;
    string updated_by = 5;
    uint64 valid_from = 6;
    bytes signature = 7;
}

message GlobalNodeBlocklist {
    repeated BlockedNode blocked_nodes = 1;
    uint64 last_updated = 2;
    string updated_by = 3;
    bytes signature = 4;
}

message NetworkPolicyUpdate {
