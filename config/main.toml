[server]
host = "0.0.0.0"
port = 8080
# host_v6 = "::1"          # Optional: IPv6 bind address (e.g., "::1" for localhost, "::" for all IPv6)
# host_v6 = "::"           # Uncomment to enable IPv6 support
trusted_proxies = ["127.0.0.1", "::1"]

[tokio]
worker_threads = "auto"

[http]
header_read_timeout_secs = 10
keep_alive_timeout_secs = 60
max_headers = 128
max_request_line_size = 8192
max_header_size_ingress = 4096
max_header_size_egress = 16384
max_request_size = 1048576
pipeline_limit = 32

[threat_level]
initial = 1
auto_scale = true
scale_up_attacks_per_min = 50
scale_up_window_secs = 60
scale_down_attacks_per_min = 10
scale_down_window_secs = 300
cooldown_secs = 60
persist_interval_normal_secs = 60
persist_interval_attack_secs = 15
auto_deescalate_timeout_mins = 15

[threat_level.global_limits]
level_1 = 1.0
level_2 = 0.75
level_3 = 0.5
level_4 = 0.25
level_5 = 0.1

[threat_level.ban_durations]
level_1_base = "1h"
level_2_base = "4h"
level_3_base = "24h"
level_4_base = "7d"
level_5_base = "permanent"

[threat_level.escalation]
enabled = true
violations_before_block = 3
violation_window_secs = 300
excluded_ips = ["127.0.0.1", "::1"]

[ip_feeds]
enabled = true
update_interval_hours = 2
url = "https://raw.githubusercontent.com/bitwire-it/ipblocklist/main/inbound.txt"
max_permanent_blocks = 1000000

[fallback]
mode = "return_404"

[admin]
enabled = true
port = 8081
# Set token via environment variable for production (required)
# Example: export SYNVOID_ADMIN_TOKEN="$(openssl rand -hex 32)"
token_env_var = "SYNVOID_ADMIN_TOKEN"

[admin.cors]
# allow_origin = "*"  # Uncomment to allow any origin (not recommended for production)
# Or specify exact origins:
# allow_origin = "https://your-domain.com"
# allow_methods = ["GET", "POST", "PUT", "DELETE"]
# allow_headers = ["Authorization", "Content-Type"]

[logging]
level = "info"
access_log = true
access_log_dir = "/var/log/synvoid"
access_log_format = "json"
retention_days = 5
max_entries_per_file = 50000

# Security configuration
[security]
# Require HMAC-signed IPC messages between master and workers (required for production)
# Set this to true to enforce signed IPC communication
ipc_enforce_signing = true
# Environment variable name containing 64-character hex IPC session key
# Generate a 32-byte key and encode as hex
# Example: export SYNVOID_IPC_KEY="$(xxd -l 32 -p /dev/urandom)"
ipc_session_key_env = "SYNVOID_IPC_KEY"

[metrics]
enabled = true
port = 9090

[defaults]
[defaults.ratelimit]
mode = "shared"

[defaults.ratelimit.ip]
per_second = 10
per_minute = 60
per_5min = 200
per_10min = 350
per_hour = 500
per_day = 1000
burst = 20

[defaults.ratelimit.global]
per_second = 500
per_minute = 5000
per_5min = 20000
max_connections = 1000

[defaults.blocked]
paths = ["/.env", "/.git", "/wp-login.php"]
use_regex = true
block_methods = ["GET", "POST", "PUT", "DELETE"]

[defaults.honeypot]
endpoints_file = "config/honeypot_endpoints.txt"
paths_per_ip = 5
ttl_secs = 86400

[defaults.honeypot.block]
enabled = true
ban_duration = "24h"

# Probe tracking - detects patterns of probing activity
# Records honeypot endpoint hits and can auto-ban during elevated threat levels
[defaults.honeypot_probe]
enabled = true
max_endpoints_per_window = 3    # trigger after this many different honeypot endpoints
window_secs = 300               # detection window in seconds
retention_days = 7             # how long to keep probe records
max_records = 1000              # max probe records to persist
auto_ban_elevated_threat = true # auto-ban during elevated threat
elevated_threat_threshold = 3   # threat level to trigger auto-ban
elevated_ban_duration = 900     # ban duration in seconds (15 min)

# Suspicious word detection - flags requests containing suspicious words in path/query
[defaults.suspicious_words]
enabled = true
words = [
    "admin", "administrator", "backup", "bak", "config",
    "debug", ".git", ".svn", ".env", "wp-admin",
    "phpmyadmin", "shell", "webshell", "passwd",
    "shadow", "id_rsa", "database", "db", "sql", "dump", "restore"
]

# Upstream error tracking - flags when healthy upstream returns error responses
# This could indicate a vulnerability discovered by an attacker
[defaults.upstream_errors]
enabled = true
min_error_endpoints = 3    # trigger after this many unique endpoints return errors
window_secs = 300          # detection window in seconds
error_codes = [400, 401, 403, 404, 500, 502, 503]

[defaults.error_pages]
enabled = true
mode = "default"
directory = "config/error_pages"

[defaults.css_challenge]
enabled = true
invalid_count_min = 100
invalid_count_max = 300
valid_count = 3

[defaults.css_challenge.block]
enabled = true
ban_duration = "24h"

[defaults.pow_challenge]
enabled = true
difficulty = 10
timeout_secs = 60
window_secs = 300
prefer_wasm = true

[defaults.pow_challenge.block]
enabled = true
ban_duration = "1h"

[defaults.challenge]
# Challenge priority: "pow_then_css", "css_then_pow", "pow_only", "css_only"
# Default: "pow_then_css" (WASM -> JS -> CSS fallback)
priority = "pow_then_css"

[defaults.bot]
block_ai_crawlers = true
enable_css_honeypot = true
enable_js_challenge = false

known_bots_allow = [
    "googlebot",
    "bingbot",
    "yandex",
    "duckduckbot",
]

ai_crawlers_block = [
    "GPTBot",
    "ChatGPT-User",
    "ClaudeBot",
    "Claude-Web",
    "CCBot",
    "Google-Extended",
    "Amazonbot",
    "FacebookBot",
]

scraper_patterns = [
    "scrapy",
    "curl",
    "wget",
    "python-requests",
    "python-urllib",
    "aiohttp",
    "httpx",
    "go-http",
    "node-fetch",
    "axios",
    "rubygems",
    "java",
    "okhttp",
    "feedparser",
    " UniversalFeedParser",
    "libwww-perl",
    "pyspider",
    "scrapeloader",
    "siteanalyzer",
    "screaming frog",
]

[defaults.worker_pool]
mode = "shared"
workers = 4
worker_port_base = 9000
auto_scale = true

[defaults.persistence]
enabled = true
data_dir = "/var/lib/synvoid"
persist_interval_secs = 60
use_persistent_kv = false

# Traffic shaping configuration
# Controls bandwidth limiting and connection limits
[traffic_shaping]
enabled = true

[traffic_shaping.global]
ingress_max_mb_s = 128
egress_max_mb_s = 128
burst_allowance_mb = 10
burst_refill_ms = 100
attack_mode_multiplier = 0.5

[traffic_shaping.connection_limits]
max_connections = 1000
max_connections_per_ip = 10
connection_queue_size = 100
connection_queue_timeout_ms = 60000
connection_burst = 5

[traffic_shaping.bandwidth]
retention_days = 365
mesh_excluded_from_total = false
monthly_cap_ingress_gb = 0
monthly_cap_egress_gb = 0
action_on_limit = "block"

[traffic_shaping.bandwidth.monthly_reset]
mode = "rolling_30_days"
# fixed_day = 15  # Uncomment to use fixed day of month (1-28)

# Data directory for persisting bandwidth counters
data_dir = "/var/lib/synvoid"

# MIME types configuration
# Path to nginx-style mime.types file (optional)
# If not specified, defaults to: config/mimes/mime.types
# To disable file loading and use only hardcoded defaults, set: enabled = false
[mimes]
enabled = true
file = "config/mimes/mime.types"