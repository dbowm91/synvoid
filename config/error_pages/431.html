<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>431 - Request Header Fields Too Large</title>
    <style>
        :root {
            --waf-font-family: 'Courier New', 'Monaco', 'Consolas', monospace;
            --waf-bg: #1a1a2e;
            --waf-surface: #16213e;
            --waf-primary: #e94560;
            --waf-text: #f0f0f0;
            --waf-border: rgba(233, 69, 96, 0.4);
        }
        @media (prefers-color-scheme: light) {
            :root {
                --waf-bg: #e8e8e8;
                --waf-surface: #ffffff;
                --waf-primary: #c41e3a;
                --waf-text: #1a1a2e;
                --waf-border: rgba(196, 30, 58, 0.3);
            }
        }
        * { box-sizing: border-box; }
        body {
            font-family: var(--waf-font-family);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 1rem;
            background-color: var(--waf-bg);
            color: var(--waf-text);
        }
        .waf-container {
            background: var(--waf-surface);
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            max-width: 420px;
            width: 100%;
            text-align: center;
            border: 2px solid var(--waf-border);
            position: relative;
        }
        .waf-container::before {
            content: '';
            position: absolute;
            top: -4px; left: -4px; right: -4px; bottom: -4px;
            border: 4px solid var(--waf-border);
            border-radius: 8px;
            pointer-events: none;
            opacity: 0.5;
        }
        .waf-error-code {
            font-size: 5rem;
            font-weight: bold;
            color: var(--waf-primary);
            margin: 0;
            line-height: 1;
            text-shadow: 0 0 20px var(--waf-primary);
        }
        .waf-title {
            color: var(--waf-primary);
            font-size: 1.5rem;
            font-weight: bold;
            margin: 1rem 0 0.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .waf-message {
            color: var(--waf-text);
            line-height: 1.6;
            margin: 0 0 1rem;
        }
        .waf-progress {
            font-size: 0.8rem;
            color: var(--waf-primary);
        }
    </style>
</head>
<body>
    <div class="waf-container">
        <p class="waf-error-code">431</p>
        <h1 class="waf-title">Request Header Fields Too Large</h1>
        <p class="waf-message">{{message}}</p>
        <p class="waf-progress">Timestamp: {{timestamp}}</p>
    </div>
</body>
</html>
