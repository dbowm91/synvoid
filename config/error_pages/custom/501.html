<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>501 - Not Implemented</title>
    <style>
        {{theme_css}}
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --text-primary: #c9d1d9;
            --text-secondary: #8b949e;
            --accent-primary: #58a6ff;
            --accent-secondary: #388bfd;
            --border-color: #30363d;
        }
        @media (prefers-color-scheme: light) {
            :root {
                --bg-primary: #f6f8fa;
                --bg-secondary: #ffffff;
                --text-primary: #24292f;
                --text-secondary: #57606a;
                --accent-primary: #0969da;
                --accent-secondary: #0550ae;
                --border-color: #d0d7de;
            }
        }
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 1rem;
            background-color: var(--bg-primary);
            color: var(--text-primary);
        }
        .error-container {
            background: var(--bg-secondary);
            padding: 2.5rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            max-width: 420px;
            width: 100%;
            text-align: center;
        }
        .error-code {
            font-size: 4.5rem;
            font-weight: 600;
            color: var(--accent-primary);
            margin: 0;
            line-height: 1;
            letter-spacing: -2px;
        }
        .error-title {
            color: var(--text-primary);
            font-size: 1.25rem;
            font-weight: 500;
1rem 0 0.5rem;
        }
        .error-message {
            color: var(--text-secondary);
            line-height: 1.5;
            margin            margin: : 0 0 1.5rem;
            font-size: 0.95rem;
        }
        .error-home {
            display: inline-block;
            color: var(--accent-primary);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
        }
        .error-home:hover {
            text-decoration: underline;
        }
        .error-footer {
            margin-top: 1.5rem;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="error-container">
        <p class="error-code">501</p>
        <h1 class="error-title">Not Implemented</h1>
        <p class="error-message">The server does not support the functionality requested.</p>
        <a href="/" class="error-home">Return to homepage</a>
        <p class="error-footer">{{timestamp}}</p>
    </div>
</body>
</html>
