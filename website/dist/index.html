        });

        function initReveal() {
            const applyReveal = () => {
                const revealElements = document.querySelectorAll('.reveal-element:not(.reveal-processed)');
                if (revealElements.length === 0) return;
                
                console.log('Processing', revealElements.length, 'reveal elements');
                revealElements.forEach(el => {
                    el.classList.add('reveal', 'reveal-processed');
                });
                
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.remove('reveal-hide');
                            entry.target.classList.add('reveal-visible');
                        } else {
                            entry.target.classList.remove('reveal-visible');
                            entry.target.classList.add('reveal-hide');
                        }
                    });
                }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });

                document.querySelectorAll('.reveal-element').forEach(el => observer.observe(el));
            };

            applyReveal();
            
            const mutationObserver = new MutationObserver((mutations) => {
                mutations.forEach((mutation) => {
                    if (mutation.addedNodes.length > 0) {
                        applyReveal();
                    }
                });
            });
            
            mutationObserver.observe(document.body, { childList: true, subtree: true });
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initReveal);
        } else {
            initReveal();
        }
    </script>
