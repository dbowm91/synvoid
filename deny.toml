[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    "CC0-1.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "WTFPL",
    "OpenSSL",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[advisories]
# Ignore unmaintained crates that are still functional
ignore = [
    # bincode - unmaintained but widely used, no security issues
    "RUSTSEC-2025-0141",
    # rustls-pemfile - archived but still works, wraps rustls-pki-types
    "RUSTSEC-2025-0134",
    # fxhash - transitive via wasmtime, no issues
    "RUSTSEC-2025-0057",
    # paste - transitive via tun-rs/netlink, no safe upgrade
    "RUSTSEC-2024-0436",
]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
