name: PR Fast

on:
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      force-full:
        description: 'Force full validation (ignore affected selector)'
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  select-affected:
    name: Select Affected Packages
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.normalize.outputs.mode }}
      packages: ${{ steps.normalize.outputs.packages }}
      root-tests: ${{ steps.normalize.outputs.root-tests }}
      feature-classes: ${{ steps.normalize.outputs.feature-classes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Run affected package selector
        id: select
        continue-on-error: true
        run: |
          FORCE_FULL=""
          if [ "${{ inputs.force-full }}" = "true" ]; then
            FORCE_FULL="--full"
          fi
          RESULT=$(python3 scripts/ci/select-affected.py \
            --base "${{ github.event.pull_request.base.sha || 'origin/main' }}" \
            --head "${{ github.sha }}" \
            --format json \
            $FORCE_FULL)
          echo "$RESULT" > /tmp/affected.json
          MODE=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin)['mode'])")
          PACKAGES=$(echo "$RESULT" | python3 -c "import sys,json; print(json.dumps(json.load(sys.stdin)['changed_packages']))")
          ROOT_TESTS=$(echo "$RESULT" | python3 -c "import sys,json; print(json.dumps(json.load(sys.stdin)['root_tests']))")
          FEATURE_CLASSES=$(echo "$RESULT" | python3 -c "import sys,json; print(json.dumps(json.load(sys.stdin)['feature_classes']))")
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "packages=$PACKAGES" >> "$GITHUB_OUTPUT"
          echo "root-tests=$ROOT_TESTS" >> "$GITHUB_OUTPUT"
          echo "feature-classes=$FEATURE_CLASSES" >> "$GITHUB_OUTPUT"
          echo "### Affected Package Selector" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          echo "$RESULT" | python3 -m json.tool >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
      - name: Normalize selector output on failure
        if: always()
        id: normalize
        shell: bash
        run: |
          # Read directly from the selector's JSON output file instead of
          # relying on step output expressions (which may not propagate with
          # continue-on-error at the step level).
          if [ -f /tmp/affected.json ]; then
            MODE=$(python3 -c "import sys,json; print(json.load(open('/tmp/affected.json'))['mode'])" 2>/dev/null || true)
            PACKAGES=$(python3 -c "import sys,json; print(json.dumps(json.load(open('/tmp/affected.json'))['changed_packages']))" 2>/dev/null || true)
            ROOT_TESTS=$(python3 -c "import sys,json; print(json.dumps(json.load(open('/tmp/affected.json'))['root_tests']))" 2>/dev/null || true)
            FEATURE_CLASSES=$(python3 -c "import sys,json; print(json.dumps(json.load(open('/tmp/affected.json'))['feature_classes']))" 2>/dev/null || true)
          else
            MODE=""
            PACKAGES="[]"
            ROOT_TESTS="[]"
            FEATURE_CLASSES="[]"
          fi
          
          if [ -z "$MODE" ] || [ "$MODE" = "" ]; then
            echo "mode=full" >> "$GITHUB_OUTPUT"
            echo "packages=[]" >> "$GITHUB_OUTPUT"
            echo "root-tests=[]" >> "$GITHUB_OUTPUT"
            echo "feature-classes=[]" >> "$GITHUB_OUTPUT"
            echo "::warning::Selector output missing or invalid — falling back to full validation"
            echo "### Selector Fallback" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Selector produced no output. Falling back to **full** validation mode." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "mode=$MODE" >> "$GITHUB_OUTPUT"
            echo "packages=$PACKAGES" >> "$GITHUB_OUTPUT"
            echo "root-tests=$ROOT_TESTS" >> "$GITHUB_OUTPUT"
            echo "feature-classes=$FEATURE_CLASSES" >> "$GITHUB_OUTPUT"
          fi
      - name: Upload selector output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: affected-packages
          path: /tmp/affected.json
          retention-days: 7

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy (default features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings

  unsafe-dns:
    name: No Unsafe in DNS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for unsafe in crates/synvoid-dns/src/
        run: |
          UNSAFE_COUNT=$(grep -r "unsafe {" crates/synvoid-dns/src/ --include="*.rs" | wc -l)
          if [ "$UNSAFE_COUNT" -gt 0 ]; then
            echo "Found $UNSAFE_COUNT unsafe block(s) in crates/synvoid-dns/src/:"
            grep -r "unsafe {" crates/synvoid-dns/src/ --include="*.rs"
            echo "::error::Found $UNSAFE_COUNT unsafe block(s) in crates/synvoid-dns/src/ - these should be eliminated"
            exit 1
          else
            echo "No unsafe blocks found in crates/synvoid-dns/src/"
          fi

  core-profile:
    name: Core Profile (No Default Features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Check core profile compilation
        run: cargo check --no-default-features

  import-check:
    name: Forbidden Import Patterns
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Check forbidden imports
        run: python scripts/check_imports.py

  security-regression:
    name: Security Regression Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust-ci
        with:
          nextest: 'true'
          cache-key: pr-security-regression
      - name: Nextest version
        run: cargo nextest --version
      - name: Run security regression tests
        run: cargo nextest run --test security_regression --cargo-profile ci --profile ci -- --test-threads=1
      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nextest-junit-security-regression
          path: target/nextest/ci/junit.xml
          retention-days: 7

  guard-suite:
    name: Architecture Guard Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust-ci
        with:
          nextest: 'true'
          cache-key: pr-guard-suite
      - name: Nextest version
        run: cargo nextest --version
      - name: Run static guards (synvoid-repo-guards)
        run: cargo nextest run -p synvoid-repo-guards --cargo-profile ci --profile ci
      - name: Run root guard tests (consolidated + standalone)
        run: |
          cargo test --test boundary_composition_guard
          cargo test --test lifecycle_task_guard
          cargo test --test plugin_guard
          cargo test --test cli_admin_guard
          cargo test --test security_guard
          cargo test --test root_facade_boundary_guard
          cargo test --test mesh_id_boundary_guard
          cargo test --test admin_mutation_response_guard
          cargo test --test admin_mutation_blocklist
          cargo test --test admin_auth_boundary
          cargo test --test mesh_admin_edge_cases
          cargo test --test failure_injection
          cargo test --test worker_mesh_supervision_boundary_guard --features mesh,dns
          cargo test --test mesh_task_ownership_guard --features mesh,dns
          cargo test --test abi_memory_boundary_guard
      - name: Test summary
        if: always()
        run: |
          JUNIT="target/nextest/ci/junit.xml"
          if [ -f "$JUNIT" ]; then
            python3 -c "
          import xml.etree.ElementTree as ET
          import sys
          tree = ET.parse('$JUNIT')
          root = tree.getroot()
          ts = root.find('testsuite')
          if ts is None:
              sys.exit(0)
          tests = int(ts.get('tests', 0))
          failures = int(ts.get('failures', 0))
          errors = int(ts.get('errors', 0))
          skipped = int(ts.get('skipped', 0))
          time_s = float(ts.get('time', 0))
          passed = tests - failures - errors - skipped
          lines = ['## Guard Suite Test Results', '', '| Metric | Value |', '|--------|-------|']
          lines.append(f'| Guard crate tests (nextest) | {tests} |')
          lines.append(f'| Passed | {passed} |')
          lines.append(f'| Failed | {failures} |')
          if skipped: lines.append(f'| Skipped | {skipped} |')
          lines.append(f'| Execution time | {time_s:.1f}s |')
          slow = []
          for tc in ts.findall('testcase'):
              t = float(tc.get('time', 0))
              if t > 5:
                  slow.append((tc.get('name', '?'), t))
          if slow:
              lines += ['', '### Slow Tests (>5s)', '', '| Test | Time |', '|------|------|']
              for name, t in sorted(slow, key=lambda x: -x[1]):
                  lines.append(f'| {name} | {t:.1f}s |')
          print('\n'.join(lines))
          " >> $GITHUB_STEP_SUMMARY
          else
            echo "## Guard Suite Test Results" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "No JUnit XML found (guard crate may not have run)." >> $GITHUB_STEP_SUMMARY
          fi
      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nextest-junit-guard-suite
          path: target/nextest/ci/junit.xml
          retention-days: 7

  upload-tests:
    name: Upload Crate Tests
    needs: [select-affected]
    if: >-
      always() &&
      !cancelled() &&
      (needs.select-affected.outputs.mode == 'full' ||
       contains(needs.select-affected.outputs.packages, '"synvoid-upload"'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust-ci
        with:
          components: clippy,rustfmt
          nextest: 'true'
          cache-key: pr-upload
      - name: Check formatting
        run: cargo fmt -p synvoid-upload -- --check
      - name: Clippy upload crate
        run: cargo clippy -p synvoid-upload --all-targets -- -D warnings
      - name: Run upload unit tests
        run: cargo nextest run -p synvoid-upload --cargo-profile ci --profile ci
      - name: Run upload tests with mesh feature
        run: cargo nextest run -p synvoid-upload --features mesh --cargo-profile ci --profile ci
      - name: Check upload all-features compile
        run: cargo check -p synvoid-upload --all-features
      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nextest-junit-upload-tests
          path: target/nextest/ci/junit.xml
          retention-days: 7

  honeypot-tests:
    name: Honeypot Crate Tests
    needs: [select-affected]
    if: >-
      always() &&
      !cancelled() &&
      (needs.select-affected.outputs.mode == 'full' ||
       contains(needs.select-affected.outputs.packages, '"synvoid-honeypot"'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust-ci
        with:
          components: clippy,rustfmt
          nextest: 'true'
          cache-key: pr-honeypot
      - name: Check formatting
        run: cargo fmt -p synvoid-honeypot -- --check
      - name: Clippy honeypot crate
        run: cargo clippy -p synvoid-honeypot --all-targets -- -D warnings
      - name: Run honeypot unit tests
        run: cargo nextest run -p synvoid-honeypot --cargo-profile ci --profile ci
      - name: Check honeypot all-features compile
        run: cargo check -p synvoid-honeypot --all-features
      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nextest-junit-honeypot-tests
          path: target/nextest/ci/junit.xml
          retention-days: 7

  tarpit-tests:
    name: Tarpit Crate Tests
    needs: [select-affected]
    if: >-
      always() &&
      !cancelled() &&
      (needs.select-affected.outputs.mode == 'full' ||
       contains(needs.select-affected.outputs.packages, '"synvoid-tarpit"'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust-ci
        with:
          components: clippy,rustfmt
          nextest: 'true'
          cache-key: pr-tarpit
      - name: Clippy tarpit crate
        run: cargo clippy -p synvoid-tarpit --all-targets -- -D warnings
      - name: Run tarpit tests
        run: cargo nextest run -p synvoid-tarpit --all-targets --cargo-profile ci --profile ci
      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nextest-junit-tarpit-tests
          path: target/nextest/ci/junit.xml
          retention-days: 7

  mesh-tests:
    name: Mesh Crate Tests
    needs: [select-affected]
    if: >-
      always() &&
      !cancelled() &&
      (needs.select-affected.outputs.mode == 'full' ||
       contains(needs.select-affected.outputs.packages, '"synvoid-mesh"'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust-ci
        with:
          components: clippy,rustfmt
          nextest: 'true'
          cache-key: pr-mesh
      - name: Check mesh crate compiles
        run: cargo check -p synvoid-mesh --features mesh --all-targets
      - name: Clippy mesh crate
        run: cargo clippy -p synvoid-mesh --features mesh --all-targets -- -D warnings
      - name: Run mesh tests
        run: cargo nextest run -p synvoid-mesh --features mesh --all-targets --cargo-profile ci --profile ci
      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nextest-junit-mesh-tests
          path: target/nextest/ci/junit.xml
          retention-days: 7

  summary:
    name: PR Fast Summary
    needs: [select-affected, fmt, clippy, unsafe-dns, core-profile, import-check, security-regression, guard-suite, upload-tests, honeypot-tests, tarpit-tests, mesh-tests]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          echo "## PR Fast CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| select-affected | ${{ needs.select-affected.result }} (mode: ${{ needs.select-affected.outputs.mode }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| fmt | ${{ needs.fmt.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| clippy | ${{ needs.clippy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| unsafe-dns | ${{ needs.unsafe-dns.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| core-profile | ${{ needs.core-profile.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| import-check | ${{ needs.import-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| security-regression | ${{ needs.security-regression.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| guard-suite | ${{ needs.guard-suite.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| upload-tests | ${{ needs.upload-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| honeypot-tests | ${{ needs.honeypot-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| tarpit-tests | ${{ needs.tarpit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| mesh-tests | ${{ needs.mesh-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          FAILED=0
          for result in \
            "${{ needs.fmt.result }}" \
            "${{ needs.clippy.result }}" \
            "${{ needs.unsafe-dns.result }}" \
            "${{ needs.core-profile.result }}" \
            "${{ needs.import-check.result }}" \
            "${{ needs.security-regression.result }}" \
            "${{ needs.guard-suite.result }}" \
            "${{ needs.upload-tests.result }}" \
            "${{ needs.honeypot-tests.result }}" \
            "${{ needs.tarpit-tests.result }}" \
            "${{ needs.mesh-tests.result }}"; do
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              FAILED=1
              break
            fi
          done
          if [ "$FAILED" -eq 1 ]; then
            echo "::error::PR Fast CI has failures"
            exit 1
          fi
          echo "All required jobs passed."
