name: CI (Redirect)

on:
  workflow_dispatch:

jobs:
  redirect-notice:
    name: CI has been split
    runs-on: ubuntu-latest
    steps:
      - name: Notice
        run: |
          echo "## CI Workflow Split" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "This workflow has been split into 4 targeted workflows:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Workflow | Trigger | Purpose |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|---------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| \`pr-fast.yml\` | PRs | Fast feedback: fmt, clippy, guards, per-crate tests |" >> $GITHUB_STEP_SUMMARY
          echo "| \`main-comprehensive.yml\` | Push to main | Build matrix, DNS, plugins, docs, audits |" >> $GITHUB_STEP_SUMMARY
          echo "| \`nightly-qualification.yml\` | Daily 4AM UTC | Alpine, FreeBSD, miri, fuzz, outdated deps |" >> $GITHUB_STEP_SUMMARY
          echo "| \`release-qualification.yml\` | Tags / dispatch | Full release build + test matrix |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Branch protection should reference the new workflow files." >> $GITHUB_STEP_SUMMARY
