name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            test: true
            features: "wireguard,icmp-nftables,icmp-ebpf"
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            test: false
            features: "wireguard,icmp-nftables"
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            test: false
            cross: true
            features: "wireguard"
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            test: false
            cross: true
            features: "wireguard"
          - target: x86_64-apple-darwin
            os: macos-latest
            test: true
            features: "wireguard"
          - target: aarch64-apple-darwin
            os: macos-latest
            test: true
            features: "wireguard"
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            test: true
            features: "wireguard,icmp-winfw"
          - target: x86_64-unknown-freebsd
            os: ubuntu-latest
            test: false
            cross: true
            features: "wireguard"

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build
        run: |
          FEATURES="${{ matrix.features }}"
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --target ${{ matrix.target }} --release --features "${FEATURES:-default}"
          else
            cargo build --target ${{ matrix.target }} --release --features "${FEATURES:-default}"
          fi
        shell: bash

      - name: Run tests
        if: matrix.test && !matrix.cross
        run: cargo test --target ${{ matrix.target }} --release --no-fail-fast

      - name: Run tests (cross)
        if: matrix.test && matrix.cross
        run: cross test --target ${{ matrix.target }} --release --no-fail-fast

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  unsafe-dns:
    name: No Unsafe in src/dns/
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Check for unsafe in src/dns/
        run: |
          # Check for unsafe blocks in src/dns/ directory
          UNSAFE_COUNT=$(grep -r "unsafe {" src/dns/ --include="*.rs" | wc -l)
          if [ "$UNSAFE_COUNT" -gt 0 ]; then
            echo "Found $UNSAFE_COUNT unsafe block(s) in src/dns/:"
            grep -r "unsafe {" src/dns/ --include="*.rs"
            echo "::error::Found $UNSAFE_COUNT unsafe block(s) in src/dns/ - these should be eliminated"
            exit 1
          else
            echo "✅ No unsafe blocks found in src/dns/"
          fi

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build documentation
        run: cargo doc --no-deps --release
        env:
          RUSTDOCFLAGS: -D warnings

  security-audit:
    name: Security Audit (cargo-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Run security audit
        run: cargo audit

  dependency-audit:
    name: Dependency Audit (cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: Run dependency audit
        run: cargo deny check

  outdated-deps:
    name: Outdated Dependencies (cargo-outdated)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install cargo-outdated
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-outdated

      - name: Check for outdated dependencies
        run: cargo outdated --release --exit-code 2 || true
        continue-on-error: true

  alpine-test:
    name: Alpine Linux Test
    runs-on: ubuntu-latest
    container:
      image: alpine:latest
    steps:
      - name: Install dependencies
        run: |
          apk add --no-cache curl git build-base musl-dev

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --target x86_64-unknown-linux-musl
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - uses: actions/checkout@v4

      - name: Build
        run: cargo build --release

      - name: Run basic tests
        run: cargo test --release -- --test-threads=1

  freebsd-test:
    name: FreeBSD Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Test on FreeBSD
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          prepare: |
            pkg install -y curl git
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          run: |
            . $HOME/.cargo/env
            cargo build --release
            cargo test --release -- --test-threads=1

  platform-compat:
    name: Platform Compatibility Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu,x86_64-unknown-linux-musl,x86_64-apple-darwin,x86_64-pc-windows-msvc,x86_64-unknown-freebsd

      - name: Check compilation for all targets
        run: |
          for target in x86_64-unknown-linux-gnu x86_64-unknown-linux-musl x86_64-apple-darwin x86_64-pc-windows-msvc x86_64-unknown-freebsd; do
            echo "=== Checking $target ==="
            cargo check --target $target || echo "::warning::$target check failed"
          done

  core-profile:
    name: Core Profile (No Default Features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Check core profile compilation
        run: cargo check --no-default-features

  import-check:
    name: Forbidden Import Patterns
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Check forbidden imports
        run: python scripts/check_imports.py

  miri-test:
    name: Miri Test (synvoid-utils)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly with miri
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri

      - name: Run miri tests on synvoid-utils
        run: |
          cargo miri test -p synvoid-utils
        continue-on-error: true

  security-regression:
    name: Security Regression Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run security regression tests
        run: cargo test --test security_regression -- --test-threads=1

  profile-matrix:
    name: Profile Matrix (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: default
            command: cargo check
          - name: no-default
            command: cargo check --no-default-features
          - name: mesh
            command: cargo check --no-default-features --features mesh
          - name: dns
            command: cargo check --no-default-features --features dns
          - name: mesh-dns
            command: cargo check --no-default-features --features mesh,dns
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-profile-${{ matrix.name }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-profile-${{ matrix.name }}-

      - name: Run profile check
        run: ${{ matrix.command }}

  guard-suite:
    name: Architecture Guard Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-guard-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-guard-

      - name: Run guard tests
        run: |
          cargo test --test root_facade_boundary_guard
          cargo test --test root_module_ledger_guard
          cargo test --test root_dependency_ownership_guard
          cargo test --test unified_server_lifecycle_ownership_guard
          cargo test --test supervisor_task_ownership_guard
          cargo test --test request_path_capability_boundary_guard
          cargo test --test data_plane_composition_boundary_guard
          cargo test --test http_request_pipeline_boundary_guard
          cargo test --test http3_waf_boundary_guard
          cargo test --test mesh_id_boundary_guard
          cargo test --test threat_intel_boundary_guard
          cargo test --test threat_intel_consumer_actionability_guard --features mesh,dns
          cargo test --test plugin_capability_boundary_guard
          cargo test --test plugin_failure_does_not_poison_manager
          cargo test --test admin_mutation_response_guard
          cargo test --test admin_mutation_blocklist
          cargo test --test admin_auth_boundary
          cargo test --test mesh_admin_edge_cases
          cargo test --test security_observability_guard
          cargo test --test failure_injection
          cargo test --test worker_mesh_supervision_boundary_guard --features mesh,dns
          cargo test --test mesh_task_ownership_guard --features mesh,dns
          cargo test --test cli_command_dispatch_guard
          cargo test --test manual_enforcement_provenance_guard
          cargo test --test background_task_ownership_guard
          cargo test --test unified_worker_composition_root_guard

  docs-link-guard:
    name: Docs Path Reference Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run docs path guard
        run: cargo test --test docs_path_reference_guard
        continue-on-error: true

  summary:
    name: CI Summary
    needs: [build, clippy, unsafe-dns, fmt, docs, security-audit, dependency-audit, outdated-deps, core-profile, import-check, miri-test, security-regression, profile-matrix, guard-suite, docs-link-guard]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          echo "## CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          
          for job in build clippy unsafe-dns fmt docs security-audit dependency-audit outdated-deps core-profile import-check miri-test security-regression profile-matrix guard-suite docs-link-guard; do
            status="${{ needs.${{ job }}.result }}"
            if [ "$status" = "success" ]; then
              echo "| $job | ✅ |" >> $GITHUB_STEP_SUMMARY
            elif [ "$status" = "skipped" ]; then
              echo "| $job | ⏭️ |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| $job | ❌ ($status) |" >> $GITHUB_STEP_SUMMARY
            fi
          done
