name: Release Qualification

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Release Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            test: true
            features: "wireguard,icmp-filter"
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            test: false
            features: "wireguard"
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            test: false
            cross: true
            features: "wireguard"
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            test: false
            cross: true
            features: "wireguard"
          - target: x86_64-apple-darwin
            os: macos-latest
            test: true
            features: "wireguard"
          - target: aarch64-apple-darwin
            os: macos-latest
            test: true
            features: "wireguard"
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            test: true
            features: "wireguard"
          - target: x86_64-unknown-freebsd
            os: ubuntu-latest
            test: false
            cross: true
            features: "wireguard"

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build
        run: |
          FEATURES="${{ matrix.features }}"
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --target ${{ matrix.target }} --release --features "${FEATURES:-default}"
          else
            cargo build --target ${{ matrix.target }} --release --features "${FEATURES:-default}"
          fi
        shell: bash

      - name: Install nextest
        if: matrix.test && !matrix.cross
        uses: taiki-e/install-action@nextest

      - name: Run tests
        if: matrix.test && !matrix.cross
        run: cargo nextest run --target ${{ matrix.target }} --cargo-profile ci --profile ci --no-fail-fast

      - name: Run doctests
        if: matrix.test && !matrix.cross
        run: cargo test --workspace --doc --profile ci

      - name: Run tests (cross)
        if: matrix.test && matrix.cross
        run: cross test --target ${{ matrix.target }} --release --no-fail-fast

      - name: Upload release artifact
        if: "!matrix.cross"
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/synvoid
          if-no-files-found: ignore

  full-test-suite:
    name: Full Test Suite (${{ matrix.suite }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: default
            command: cargo nextest run --cargo-profile ci --profile ci --no-fail-fast
            doctests: cargo test --workspace --doc --profile ci
          - suite: mesh
            command: cargo nextest run --features mesh --cargo-profile ci --profile ci --no-fail-fast
            doctests: cargo test --workspace --doc --features mesh --profile ci

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-suite-${{ matrix.suite }}

      - name: Install nextest
        uses: taiki-e/install-action@nextest

      - name: Nextest version
        run: cargo nextest --version

      - name: Run test suite
        run: ${{ matrix.command }}

      - name: Run doctests
        run: ${{ matrix.doctests }}

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nextest-junit-release-${{ matrix.suite }}
          path: target/nextest/ci/junit.xml
          retention-days: 7

  clippy:
    name: Clippy (all features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  summary:
    name: Release Qualification Summary
    needs: [build, full-test-suite, clippy]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          echo "## Release Qualification Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| full-test-suite | ${{ needs.full-test-suite.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| clippy | ${{ needs.clippy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          FAILED=0
          for result in \
            "${{ needs.build.result }}" \
            "${{ needs.full-test-suite.result }}" \
            "${{ needs.clippy.result }}"; do
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              FAILED=1
              break
            fi
          done
          if [ "$FAILED" -eq 1 ]; then
            echo "::error::Release Qualification has failures"
            exit 1
          fi
          echo "All required jobs passed."
